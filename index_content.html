
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo SMT - Hiệu Quả Truyền Thông GTM & CTKM</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pnj: {
                            blue: '#0B2046', /* Xanh Navy PNJ */
                            gold: '#C69C38', /* Vàng Gold PNJ */
                            light: '#F8F9FA',
                            gray: '#6B7280'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #F3F4F6; }
        .gradient-text {
            background: linear-gradient(to right, #C69C38, #E2C275);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(11, 32, 70, 0.1), 0 2px 4px -1px rgba(11, 32, 70, 0.06);
        }
        /* Ẩn scrollbar cho khu vực tab trên mobile để gọn hơn */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('blog');

            // Cập nhật lại icons mỗi khi chuyển tab để icon mới được render
            React.useEffect(() => {
                lucide.createIcons();
            }, [activeTab]);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-pnj-blue">
                    <div className="max-w-5xl mx-auto space-y-6 md:space-y-8">
                        
                        {/* Header Section */}
                        <header className="bg-white rounded-t-2xl rounded-b-md p-6 md:p-8 card-shadow border-b-4 border-pnj-gold flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div className="flex items-center gap-4 md:gap-6">
                                {/* KH & BL Logo */}
                                <div className="flex-shrink-0">
                                    <img 
                                        src="logo_KHBL.png" 
                                        alt="KH & BL Logo" 
                                        className="h-12 md:h-16 w-auto object-contain" 
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150x64/0B2046/C69C38?text=KH%26BL+Logo'; }}
                                    />
                                </div>
                                
                                {/* Divider */}
                                <div className="h-12 md:h-16 w-px bg-gray-300"></div>
                                
                                {/* Titles */}
                                <div className="flex flex-col justify-center">
                                    <h1 className="text-xl md:text-2xl lg:text-3xl font-bold text-pnj-blue tracking-wider uppercase">
                                        Creative Hub
                                    </h1>
                                    <p className="text-xs md:text-sm text-gray-500 uppercase tracking-widest mt-1 font-medium">
                                        Supporting Center
                                    </p>
                                </div>
                            </div>

                            {/* Right Badge */}
                            <div className="bg-[#FCF6EC] border border-[#E6D0A7] px-6 py-2.5 rounded-full flex items-center justify-center gap-2.5 w-full md:w-auto shadow-sm">
                                <i data-lucide="award" className="w-5 h-5 text-[#8B1A1A]"></i>
                                <span className="text-[#8B1A1A] font-bold text-sm md:text-base tracking-wide whitespace-nowrap">
                                    XUÂN - VALENTINE - THẦN TÀI
                                </span>
                            </div>
                        </header>

                        {/* Main Tab Section */}
                        <section className="bg-white rounded-2xl card-shadow overflow-hidden">
                            
                            {/* Mục Lớn Tiêu Đề */}
                            <div className="bg-gradient-to-r from-pnj-blue to-[#1a3a6c] p-6 md:p-8 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-full opacity-10 flex items-center justify-center">
                                    <i data-lucide="bar-chart-2" className="w-64 h-64 text-white"></i>
                                </div>
                                <h2 className="relative z-10 font-serif text-2xl md:text-3xl font-bold text-pnj-gold uppercase tracking-wide">
                                    Truyền Thông GTM <br className="md:hidden" />Cho BST Mới & CTKM
                                </h2>
                                <p className="relative z-10 text-blue-100 mt-3 max-w-2xl mx-auto text-sm md:text-base">
                                    Tổng hợp số liệu tương tác và kết quả sản xuất nội dung hình ảnh trên các nền tảng chính thức.
                                </p>
                            </div>

                            {/* Buttons Navigation */}
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-3 sm:gap-6 p-4 md:p-6 bg-gray-50/80 border-b border-gray-200">
                                <button 
                                    className={`w-full sm:w-auto min-w-[200px] md:min-w-[240px] py-3.5 px-6 rounded-xl font-bold text-sm md:text-base transition-all duration-300 flex items-center justify-center gap-2 shadow-sm
                                        ${activeTab === 'blog' 
                                            ? 'bg-pnj-blue text-white ring-2 ring-pnj-gold ring-offset-2' 
                                            : 'bg-white text-gray-500 border border-gray-200 hover:border-pnj-gold hover:text-pnj-blue hover:shadow-md'}`}
                                    onClick={() => setActiveTab('blog')}
                                >
                                    <i data-lucide="layout-template" className={`w-5 h-5 ${activeTab === 'blog' ? 'text-pnj-gold' : ''}`}></i> 
                                    Nền tảng BLOG
                                </button>
                                <button 
                                    className={`w-full sm:w-auto min-w-[200px] md:min-w-[240px] py-3.5 px-6 rounded-xl font-bold text-sm md:text-base transition-all duration-300 flex items-center justify-center gap-2 shadow-sm
                                        ${activeTab === 'zalo' 
                                            ? 'bg-pnj-blue text-white ring-2 ring-pnj-gold ring-offset-2' 
                                            : 'bg-white text-gray-500 border border-gray-200 hover:border-pnj-gold hover:text-pnj-blue hover:shadow-md'}`}
                                    onClick={() => setActiveTab('zalo')}
                                >
                                    <i data-lucide="message-square" className={`w-5 h-5 ${activeTab === 'zalo' ? 'text-pnj-gold' : ''}`}></i> 
                                    ZALO BROADCAST
                                </button>
                            </div>

                            {/* Tabs Content */}
                            <div className="p-6 md:p-8 min-h-[400px]">
                                
                                {/* TAB 1: BLOG */}
                                {activeTab === 'blog' && (
                                    <div className="animate-fade-in space-y-8">
                                        {/* Highlight Stats */}
                                        <div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                                            <div>
                                                <h3 className="text-gray-600 font-medium mb-1">Tổng lượt xem trang</h3>
                                                <div className="flex items-baseline gap-3">
                                                    <span className="font-serif text-5xl font-bold text-pnj-blue">49.124</span>
                                                    <span className="text-green-600 bg-green-100 px-2 py-1 rounded text-xs font-bold flex items-center">
                                                        <i data-lucide="trending-up" className="w-3 h-3 mr-1"></i> Tăng trưởng
                                                    </span>
                                                </div>
                                            </div>
                                            <p className="text-sm text-gray-600 md:max-w-sm text-center md:text-right">
                                                Triển khai mạnh mẽ nội dung hình ảnh sắc nét, truyền tải đúng tinh thần thương hiệu cho các BST mới từ các Sub-brand, kết hợp truyền thông CTKM từ Retail/Omni.
                                            </p>
                                        </div>

                                        {/* Campaigns Grid */}
                                        <div>
                                            <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <i data-lucide="star" className="w-4 h-4"></i> Các dự án nổi bật
                                            </h4>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div className="border border-gray-100 bg-white rounded-xl p-6 text-center hover:border-pnj-gold hover:shadow-md transition-all">
                                                    <div className="bg-gray-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                                        <span className="font-serif font-bold text-xl text-pnj-blue">S</span>
                                                    </div>
                                                    <span className="font-bold text-pnj-blue block mb-1">STYLE by PNJ</span>
                                                    <span className="text-sm text-gray-500">BST Berry Boo</span>
                                                </div>
                                                <div className="border border-gray-100 bg-white rounded-xl p-6 text-center hover:border-pnj-gold hover:shadow-md transition-all">
                                                    <div className="bg-gray-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                                        <span className="font-serif font-bold text-xl text-pnj-blue">D</span>
                                                    </div>
                                                    <span className="font-bold text-pnj-blue block mb-1">Disney | PNJ</span>
                                                    <span className="text-sm text-gray-500">Truyền thông BST</span>
                                                </div>
                                                <div className="border border-gray-100 bg-white rounded-xl p-6 text-center hover:border-pnj-gold hover:shadow-md transition-all">
                                                    <div className="bg-gray-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                                        <span className="font-serif font-bold text-xl text-pnj-blue">M</span>
                                                    </div>
                                                    <span className="font-bold text-pnj-blue block mb-1">MANCODE by PNJ</span>
                                                    <span className="text-sm text-gray-500">BST Mã Kim Linh</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 2: ZALO BROADCAST */}
                                {activeTab === 'zalo' && (
                                    <div className="animate-fade-in space-y-8">
                                        {/* Highlight Stats */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-yellow-50/50 border border-yellow-100 rounded-2xl p-6 flex flex-col justify-center">
                                                <h3 className="text-gray-600 font-medium mb-1">Tổng lượt xem Broadcast</h3>
                                                <div className="flex items-baseline gap-3">
                                                    <span className="font-serif text-5xl font-bold text-pnj-gold">52.609</span>
                                                    <span className="text-green-600 bg-green-100 px-2 py-1 rounded text-xs font-bold flex items-center">
                                                        <i data-lucide="trending-up" className="w-3 h-3 mr-1"></i> Tăng trưởng
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="bg-pnj-blue rounded-2xl p-6 flex flex-col justify-center text-white relative overflow-hidden">
                                                <div className="absolute right-0 top-0 h-full w-32 bg-gradient-to-l from-white/10 to-transparent"></div>
                                                <h3 className="text-blue-200 font-medium mb-1">Tệp khách hàng tiếp cận</h3>
                                                <div className="flex items-baseline gap-3">
                                                    <span className="font-serif text-4xl md:text-5xl font-bold gradient-text">> 400K</span>
                                                    <span className="text-blue-100 text-sm">Followers</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Description */}
                                        <p className="text-sm md:text-base text-gray-600 leading-relaxed text-center md:text-left px-2">
                                            Tối ưu hóa thiết kế và nội dung thông điệp ngắn gọn, hấp dẫn để tương tác trực tiếp với tệp khách hàng, thúc đẩy hiệu quả các CTKM Retail và định vị Brand/Sub-brand.
                                        </p>

                                        {/* Campaigns Grid */}
                                        <div>
                                            <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <i data-lucide="zap" className="w-4 h-4"></i> Các chiến dịch nổi bật
                                            </h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                <div className="border border-gray-100 bg-white rounded-xl py-4 px-6 text-center flex items-center justify-center gap-2 hover:border-pnj-gold transition-colors">
                                                    <div className="w-2 h-2 rounded-full bg-blue-400"></div>
                                                    <span className="font-bold text-pnj-blue">Doraemon | PNJ</span>
                                                </div>
                                                <div className="border border-gray-100 bg-white rounded-xl py-4 px-6 text-center flex items-center justify-center gap-2 hover:border-pnj-gold transition-colors">
                                                    <div className="w-2 h-2 rounded-full bg-red-400"></div>
                                                    <span className="font-bold text-pnj-blue">ARTA by PNJ</span>
                                                </div>
                                                <div className="border border-gray-100 bg-white rounded-xl py-4 px-6 text-center flex items-center justify-center gap-2 hover:border-pnj-gold transition-colors">
                                                    <div className="w-2 h-2 rounded-full bg-pnj-gold"></div>
                                                    <span className="font-bold text-pnj-blue">RETAIL (CTKM)</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* SMT Takeaway */}
                        <div className="bg-white border-l-4 border-pnj-gold rounded-r-2xl p-6 card-shadow flex flex-col md:flex-row items-start md:items-center gap-5">
                            <div className="bg-yellow-50 p-3 rounded-full flex-shrink-0 mt-1 md:mt-0">
                                <i data-lucide="award" className="w-6 h-6 text-pnj-gold"></i>
                            </div>
                            <div>
                                <h3 className="text-lg font-bold text-pnj-blue mb-1">Đánh giá chiến lược</h3>
                                <p className="text-gray-600 text-sm md:text-base leading-relaxed">
                                    Chất lượng nội dung đạt chuẩn <strong>chuẩn guideline</strong> đang là đòn bẩy cốt lõi thúc đẩy GTM cho các Bộ sưu tập. Việc đầu tư hình ảnh đã trực tiếp tạo ra <strong>hơn 100.000 lượt xem tự nhiên (Organic views)</strong>, giúp tối ưu hóa chi phí quảng cáo và tiếp cận sâu sát tệp khách hàng tiềm năng của PNJ trên các kênh sở hữu (Owned media).
                                </p>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
